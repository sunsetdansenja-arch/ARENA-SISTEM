<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASIR ARENA PLAYBOX</title>
    
    <link rel="icon" href="https://raw.githubusercontent.com/sunsetdansenja-arch/bot-arrena-assets/main/logo%20arena%20gaming.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --mario-orange: #FF6B00;
            --mario-black: #000000;
            --mario-yellow: #FFD700;
        }
        
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--mario-orange);
            color: var(--mario-black);
            -webkit-font-smoothing: antialiased;
            background-image: radial-gradient(rgba(0,0,0,0.05) 2px, transparent 2px);
            background-size: 20px 20px;
            overflow-x: hidden;
        }

        .mario-card {
            background-color: white;
            border: 4px solid var(--mario-black);
            border-radius: 16px;
            box-shadow: 8px 8px 0px 0px var(--mario-black);
        }

        .mario-btn {
            background-color: white;
            border: 4px solid var(--mario-black);
            border-radius: 12px;
            box-shadow: 4px 4px 0px 0px var(--mario-black);
            transition: all 0.1s ease-in-out;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .mario-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px var(--mario-black);
        }

        .mario-btn-yellow { background-color: var(--mario-yellow); }
        .mario-btn-gray { background-color: #E5E7EB; color: #6B7280; box-shadow: 2px 2px 0px 0px var(--mario-black); }

        .mario-input {
            width: 100%;
            background-color: #F3F4F6;
            border: 3px solid var(--mario-black);
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            outline: none;
        }
        
        .mario-input:focus {
            background-color: #ffffff;
            border-color: var(--mario-orange);
        }

        .hidden { display: none !important; }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col items-center">

    <div id="app" class="max-w-md w-full mx-auto animate-pop pb-10">
        
        <header class="text-center mb-6">
            <h1 class="text-3xl font-black text-white uppercase" style="text-shadow: 3px 3px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000, 1px 1px 0px #000;">
                SISTEM KASIR
            </h1>
            <div class="mt-2 bg-black text-yellow-400 px-4 py-1 rounded-lg border-2 border-white inline-block">
                <p class="text-sm font-bold tracking-wide">ARENA PLAYBOX</p>
            </div>
        </header>

        <section id="region-step" class="mario-card p-6 relative z-10">
            <h2 class="text-xl font-bold mb-4 text-center border-b-4 border-black pb-2">KASIR CABANG:</h2>
            <div class="grid grid-cols-1 gap-4">
                <button onclick="APP_LOGIC.selectRegion('Sabang')" class="mario-btn p-4 text-lg">📍 SABANG</button>
                <button onclick="APP_LOGIC.selectRegion('Banda Aceh')" class="mario-btn mario-btn-yellow p-4 text-lg">📍 BANDA ACEH</button>
                <button onclick="APP_LOGIC.selectRegion('Aceh Timur')" class="mario-btn p-4 text-lg">📍 ACEH TIMUR</button>
            </div>
        </section>

        <section id="booking-step" class="hidden relative z-10">
            <div class="flex items-center justify-between mb-4">
                <button onclick="location.reload()" class="mario-btn bg-white px-4 py-2 text-sm mr-3">← GANTI CABANG</button>
                <span class="bg-black text-white px-3 py-1 rounded-full text-xs font-bold border-2 border-white" id="region-badge">BANDA ACEH</span>
            </div>

            <div class="mario-card p-6">
                <h2 class="text-2xl font-black mb-6 text-center uppercase border-b-4 border-black pb-2">INPUT RENTAL</h2>

                <form id="orderForm" class="space-y-4">
                    
                    <div>
                        <label class="block font-bold mb-1 text-sm">NAMA KASIR (ADMIN)</label>
                        <input type="text" id="admin_name" required class="mario-input" placeholder="Nama kamu...">
                    </div>

                    <hr class="border-black border-2 my-4">

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block font-bold mb-1 text-sm">NAMA PELANGGAN</label>
                            <input type="text" id="name" required class="mario-input" placeholder="Nama player...">
                        </div>
                        <div>
                            <label class="block font-bold mb-1 text-sm">NO WHATSAPP</label>
                            <input type="number" id="wa" required class="mario-input" placeholder="08xxx...">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2 mt-4">
                        <div>
                            <label class="block font-bold mb-1 text-sm">JENIS SEWA</label>
                            <div class="relative">
                                <select id="type-selector" onchange="APP_LOGIC.switchType(this.value)" class="mario-input appearance-none cursor-pointer">
                                    <option value="Paket">Paket</option>
                                    <option value="Regular">Regular</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 font-black">▼</div>
                            </div>
                        </div>
                        <div>
                            <label class="block font-bold mb-1 text-sm">PILIH UNIT</label>
                            <div class="relative">
                                <select id="unit" class="mario-input appearance-none cursor-pointer">
                                    <option value="Unit 1">Unit 1</option>
                                    <option value="Unit 2">Unit 2</option>
                                    <option value="Unit 3">Unit 3</option>
                                    <option value="Unit 4">Unit 4</option>
                                    <option value="Unit 5">Unit 5</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 font-black">▼</div>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block font-bold mb-1 text-sm">PILIHAN AMUNISI (<span id="type-label">Paket</span>)</label>
                        <div class="relative">
                            <select id="product" onchange="APP_LOGIC.updatePriceUI()" class="mario-input appearance-none cursor-pointer">
                                </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 font-black">▼</div>
                        </div>
                    </div>

                    <div>
                        <label class="block font-bold mb-1 text-sm">STATUS PEMBAYARAN</label>
                        <div class="relative">
                            <select id="pembayaran" class="mario-input appearance-none cursor-pointer">
                                <option value="Lunas">✅ LUNAS</option>
                                <option value="Belum">❌ BELUM LUNAS</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 font-black">▼</div>
                        </div>
                    </div>

                    <div class="bg-black text-white p-4 rounded-xl border-4 border-yellow-400 mt-6 text-center">
                        <p class="font-bold text-gray-300 text-sm">TOTAL TAGIHAN:</p>
                        <p id="real-price" class="text-3xl font-black text-yellow-400 drop-shadow-md">Rp 0</p>
                    </div>

                    <button type="submit" id="submit-btn" class="w-full mario-btn mario-btn-yellow p-4 text-xl mt-6 uppercase">
                        💾 SIMPAN DATA RENTAL
                    </button>
                </form>
            </div>
        </section>
    </div>

    <script>
        // ==========================================
        // 1. CONFIGURATION (URL WEBHOOK N8N)
        // ==========================================
        const CONFIG = {
            // PASTIKAN URL INI BENAR (Sesuai dengan Webhook GET/POST n8n Abang)
            WEBHOOK_URL: "https://hook.eu2.make.com/xxxxxxxxxxxxxxx", // GANTI DENGAN URL WEBHOOK N8N ABANG
            data: {
                Paket: [
                    { name: "Paket Malam", time: "00:00 - 10:00", price: 50000 },
                    { name: "Paket Pagi", time: "10:00 - 17:00", price: 45000 },
                    { name: "Paket Sore", time: "17:00 - 23:40", price: 45000 },
                    { name: "Paket Sultan 24 Jam", time: "Bebas", price: 115000 }
                ],
                Regular: [
                    { name: "PlayBox - 3 Jam", time: "Bebas", price: 30000 },
                    { name: "PlayBox - 4 Jam", time: "Bebas", price: 40000 },
                    { name: "PlayBox - 5 Jam", time: "Bebas", price: 50000 }
                ]
            }
        };

        // ==========================================
        // 2. APP LOGIC (SISTEM KASIR)
        // ==========================================
        const APP_LOGIC = {
            state: {
                region: "",
                type: "Paket",
                selectedItem: null
            },

            formatRupiah: (number) => {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
            },

            selectRegion: (regionName) => {
                APP_LOGIC.state.region = regionName;
                document.getElementById('region-step').classList.add('hidden');
                document.getElementById('booking-step').classList.remove('hidden');
                document.getElementById('booking-step').classList.add('animate-pop');
                document.getElementById('region-badge').innerText = regionName.toUpperCase();
                
                APP_LOGIC.updateDropdown();
            },

            switchType: (type) => {
                APP_LOGIC.state.type = type;
                document.getElementById('type-label').innerText = type;
                APP_LOGIC.updateDropdown();
            },

            updateDropdown: () => {
                const select = document.getElementById('product');
                const items = CONFIG.data[APP_LOGIC.state.type];
                
                select.innerHTML = items.map((item, index) => {
                    const timeLabel = item.time !== "Bebas" ? ` (${item.time})` : "";
                    return `<option value="${index}">${item.name}${timeLabel}</option>`;
                }).join('');
                
                APP_LOGIC.updatePriceUI();
            },

            updatePriceUI: () => {
                const select = document.getElementById('product');
                const selectedIndex = select.value;
                const item = CONFIG.data[APP_LOGIC.state.type][selectedIndex];
                
                if (item) {
                    APP_LOGIC.state.selectedItem = item;
                    document.getElementById('real-price').innerText = APP_LOGIC.formatRupiah(item.price);
                }
            },

            submitForm: async (e) => {
                e.preventDefault();
                
                const btn = document.getElementById('submit-btn');
                btn.innerText = "⏳ MEMPROSES...";
                btn.disabled = true;

                const item = APP_LOGIC.state.selectedItem;
                const now = new Date();
                
                // PAYLOAD SESUAI DENGAN NODE n8n "input_rental"
                const payload = {
                    action: "input_rental",
                    name: document.getElementById('name').value,
                    wa: document.getElementById('wa').value,
                    price: item.price, // Harga dikirim berupa angka
                    admin_name: document.getElementById('admin_name').value,
                    branch: APP_LOGIC.state.region,
                    unit: document.getElementById('unit').value,
                    paket: `${item.name} (${APP_LOGIC.state.type})`,
                    status_unit: "Aktif",
                    jam_mulai_sewa: now.toLocaleString('id-ID'),
                    pembayaran: document.getElementById('pembayaran').value
                };

                try {
                    const response = await fetch(CONFIG.WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if(response.ok) {
                        alert("✅ Data berhasil disimpan ke Sistem!");
                        // Reset form ringan tanpa reload agar nama kasir & cabang tetap tersimpan
                        document.getElementById('name').value = '';
                        document.getElementById('wa').value = '';
                    } else {
                        alert("❌ Gagal menyimpan data. Cek koneksi atau Webhook n8n.");
                    }
                } catch (error) {
                    alert("❌ Terjadi kesalahan jaringan.");
                    console.error(error);
                } finally {
                    btn.innerText = "💾 SIMPAN DATA RENTAL";
                    btn.disabled = false;
                }
            }
        };

        // Inisialisasi Event Listener
        document.getElementById('orderForm').addEventListener('submit', APP_LOGIC.submitForm);

    </script>
</body>
</html>
