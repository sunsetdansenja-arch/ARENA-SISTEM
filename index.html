<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUPER APP - ARENA PLAYBOX</title>
    
    <link rel="icon" href="https://raw.githubusercontent.com/sunsetdansenja-arch/bot-arrena-assets/main/logo%20arena%20gaming.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --mario-orange: #FF6B00;
            --mario-black: #000000;
            --mario-yellow: #FFD700;
        }
        
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--mario-orange);
            color: var(--mario-black);
            -webkit-font-smoothing: antialiased;
            background-image: radial-gradient(rgba(0,0,0,0.05) 2px, transparent 2px);
            background-size: 20px 20px;
        }

        .mario-card {
            background-color: white;
            border: 4px solid var(--mario-black);
            border-radius: 16px;
            box-shadow: 6px 6px 0px 0px var(--mario-black);
        }

        .mario-btn {
            background-color: white;
            border: 4px solid var(--mario-black);
            border-radius: 12px;
            box-shadow: 4px 4px 0px 0px var(--mario-black);
            transition: all 0.1s ease-in-out;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
        }
        .mario-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px var(--mario-black); }

        .mario-input {
            width: 100%; background-color: #F3F4F6; border: 3px solid var(--mario-black);
            border-radius: 8px; padding: 10px; font-weight: 600; outline: none;
        }
        .mario-input:focus { border-color: var(--mario-orange); background-color: white; }

        .hidden { display: none !important; }
        .animate-pop { animation: popIn 0.3s forwards; }
        @keyframes popIn { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; border-top: 4px solid var(--mario-black);
            display: flex; justify-content: space-around; padding: 10px 0; z-index: 50;
        }
        .nav-item { flex: 1; text-align: center; font-size: 12px; font-weight: bold; color: gray; cursor: pointer; }
        .nav-item.active { color: var(--mario-orange); text-shadow: 1px 1px 0px black; }
        .nav-icon { font-size: 24px; display: block; margin-bottom: 2px; }

        /* Loader */
        #loader {
            position: fixed; inset: 0; background: rgba(255,107,0,0.95); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner {
            width: 50px; height: 50px; border: 6px solid var(--mario-black);
            border-top-color: var(--mario-yellow); border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Print A4 Area */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; background: white; color: black; padding: 20px; }
            .mario-card, body { border: none; box-shadow: none; background: white; }
        }
    </style>
</head>
<body class="pb-28">

    <div id="loader" class="hidden">
        <div class="spinner mb-4"></div>
        <h2 id="loader-text" class="text-2xl font-black text-white" style="text-shadow: 2px 2px 0px #000;">MEMPROSES...</h2>
    </div>

    <header class="flex justify-between items-center bg-black p-4 sticky top-0 z-40 border-b-4 border-yellow-400 shadow-md">
        <div>
            <h1 class="text-xl font-black text-white" style="text-shadow: 2px 2px 0px #FF6B00;">ARENA PLAYBOX</h1>
            <p id="user-info-text" class="text-xs font-bold text-yellow-400">Silakan Login</p>
        </div>
        <div id="header-actions" class="hidden flex gap-2">
            <button onclick="APP.loadDashboard()" class="bg-blue-500 text-white p-2 rounded-lg border-2 border-white shadow-[2px_2px_0px_#fff]">🔄</button>
            <button onclick="APP.logout()" class="bg-red-500 text-white p-2 rounded-lg border-2 border-white shadow-[2px_2px_0px_#fff]">🚪 Keluar</button>
        </div>
    </header>

    <div id="app" class="max-w-md mx-auto p-4 animate-pop mt-2">
        
        <section id="view-login" class="mario-card p-6">
            <h2 class="text-2xl font-black mb-6 text-center border-b-4 border-black pb-2">LOGIN SISTEM</h2>
            <form id="form-login" class="space-y-4">
                <div>
                    <label class="block font-bold mb-1">USERNAME</label>
                    <input type="text" id="login-user" required class="mario-input">
                </div>
                <div>
                    <label class="block font-bold mb-1">PASSWORD</label>
                    <input type="password" id="login-pass" required class="mario-input">
                </div>
                <div>
                    <label class="block font-bold mb-1">PILIH CABANG</label>
                    <select id="login-branch" class="mario-input">
                        <option value="Banda">Banda Aceh</option>
                        <option value="Sabang">Sabang</option>
                        <option value="Aceh Timur">Aceh Timur</option>
                    </select>
                </div>
                <button type="submit" class="w-full mario-btn bg-[#FFD700] p-4 text-xl mt-4">🚀 MASUK</button>
            </form>
        </section>

        <section id="view-admin" class="hidden">
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="mario-card p-3 bg-[#FFE8B3] text-center">
                    <p class="text-[10px] font-bold text-gray-600">OMSET HARI INI</p>
                    <p id="admin-omset-today" class="text-lg font-black text-[#FF6B00]">Rp 0</p>
                </div>
                <div class="mario-card p-3 text-center">
                    <p class="text-[10px] font-bold text-gray-600">OMSET KEMARIN</p>
                    <p id="admin-omset-yesterday" class="text-lg font-black">Rp 0</p>
                </div>
            </div>
            <div id="admin-form-container"></div>
        </section>

        <section id="view-manager" class="hidden">
            <div id="manager-content"></div>

            <div class="bottom-nav">
                <div class="nav-item active" onclick="APP.switchTab('dashboard')" id="tab-dashboard">
                    <span class="nav-icon">🎮</span>LOGS
                </div>
                <div class="nav-item" onclick="APP.switchTab('input')" id="tab-input">
                    <span class="nav-icon">📝</span>INPUT
                </div>
                <div class="nav-item" onclick="APP.switchTab('expense')" id="tab-expense">
                    <span class="nav-icon">💸</span>EXPENSE
                </div>
                <div class="nav-item" onclick="APP.switchTab('report')" id="tab-report">
                    <span class="nav-icon">📊</span>REPORT
                </div>
            </div>
        </section>

        <section id="view-owner" class="hidden">
            <div class="mario-card p-4 bg-black text-white text-center mb-4">
                <p class="text-sm font-bold text-gray-400">OMSET BULAN INI</p>
                <p id="owner-omset-month" class="text-4xl font-black text-yellow-400">Rp 0</p>
            </div>
            <div class="mario-card p-4 bg-[#FFE8B3] text-center mb-6">
                <p class="text-sm font-bold text-gray-600">OMSET HARI INI</p>
                <p id="owner-omset-today" class="text-2xl font-black text-[#FF6B00]">Rp 0</p>
            </div>

            <div class="mb-4">
                <select id="owner-filter-cabang" onchange="APP.renderOwnerLogs()" class="mario-input">
                    <option value="ALL">Semua Cabang</option>
                    <option value="Banda">Banda Aceh</option>
                    <option value="Sabang">Sabang</option>
                    <option value="Aceh Timur">Aceh Timur</option>
                </select>
            </div>

            <h3 class="font-black text-white mb-2" style="text-shadow: 1px 1px 0px #000;">RIWAYAT TRANSAKSI:</h3>
            <div id="owner-log-list" class="space-y-3 pb-6"></div>
        </section>

    </div>

    <div id="print-area" class="hidden"></div>

    <script>
        // =====================================
        // 1. CONFIGURATION
        // =====================================
        const CONFIG = {
            WEBHOOK_URL: "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/86cee1b8-b00d-4aa6-8ff4-23735dc9afe1", // URL PASTIKAN BENAR
            PRICING: {
                Paket: [
                    { name: "Paket Malam", time: "00:00 - 10:00", price: 50000 },
                    { name: "Paket Pagi", time: "10:00 - 17:00", price: 45000 },
                    { name: "Paket Sore", time: "17:00 - 23:40", price: 45000 },
                    { name: "Paket Sultan 24 Jam", time: "Bebas", price: 115000 }
                ],
                Regular: [
                    { name: "PlayBox - 3 Jam", time: "Bebas", price: 30000 },
                    { name: "PlayBox - 4 Jam", time: "Bebas", price: 40000 },
                    { name: "PlayBox - 5 Jam", time: "Bebas", price: 50000 }
                ]
            }
        };

        const STATE = {
            user: null, // { username, role, branch }
            logs: [],
            expenses: [],
            selectedRentPrice: 0,
            activeTab: 'dashboard'
        };

        // =====================================
        // 2. CORE LOGIC (APP)
        // =====================================
        const APP = {
            init: () => {
                document.getElementById('form-login').addEventListener('submit', APP.handleLogin);
                const savedUser = localStorage.getItem('arena_user');
                if (savedUser) {
                    STATE.user = JSON.parse(savedUser);
                    APP.loadDashboard();
                }
            },

            formatRp: (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(Number(num) || 0),
            
            showLoader: (text) => {
                document.getElementById('loader-text').innerText = text;
                document.getElementById('loader').classList.remove('hidden');
            },
            hideLoader: () => document.getElementById('loader').classList.add('hidden'),

            callAPI: async (payload) => {
                try {
                    const res = await fetch(CONFIG.WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!res.ok) throw new Error("HTTP Error " + res.status);
                    const text = await res.text();
                    return text ? JSON.parse(text) : [];
                } catch (e) {
                    console.error("API Error:", e);
                    return null;
                }
            },

            // --- RE-USABLE FORM TEMPLATE ---
            getRentalFormHTML: () => `
                <div class="mario-card p-5 animate-pop">
                    <h2 class="text-xl font-black mb-4 text-center border-b-4 border-black pb-2">INPUT RENTAL BARU</h2>
                    <form id="form-rental" onsubmit="APP.submitRental(event)" class="space-y-4">
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="block text-xs font-bold mb-1">PELANGGAN</label><input type="text" id="rent-name" required class="mario-input" placeholder="Nama..."></div>
                            <div><label class="block text-xs font-bold mb-1">NO WA</label><input type="number" id="rent-wa" required class="mario-input" placeholder="08xxx..."></div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="block text-xs font-bold mb-1">TIPE SEWA</label>
                                <select id="rent-type" onchange="APP.updateFormPricing()" class="mario-input">
                                    <option value="Paket">Paket</option><option value="Regular">Regular</option>
                                </select>
                            </div>
                            <div><label class="block text-xs font-bold mb-1">UNIT</label>
                                <select id="rent-unit" class="mario-input">
                                    <option value="Unit 1">Unit 1</option><option value="Unit 2">Unit 2</option>
                                    <option value="Unit 3">Unit 3</option><option value="Unit 4">Unit 4</option>
                                    <option value="Unit 5">Unit 5</option><option value="Unit 6">Unit 6</option>
                                    <option value="Unit 7">Unit 7</option>
                                </select>
                            </div>
                        </div>
                        <div><label class="block text-xs font-bold mb-1">AMUNISI</label><select id="rent-product" onchange="APP.updatePriceOnSelect()" class="mario-input"></select></div>
                        <div><label class="block text-xs font-bold mb-1">PEMBAYARAN</label>
                            <select id="rent-payment" class="mario-input">
                                <option value="Lunas">✅ LUNAS</option><option value="Belum">❌ BELUM LUNAS</option>
                            </select>
                        </div>
                        <div class="bg-black p-3 rounded-lg border-2 border-yellow-400 text-center">
                            <p class="text-xs font-bold text-gray-300">TOTAL TAGIHAN</p>
                            <p id="rent-price-display" class="text-2xl font-black text-yellow-400">Rp 0</p>
                        </div>
                        <button type="submit" class="w-full mario-btn bg-yellow-400 p-3 text-lg mt-4">💾 SIMPAN TRANSAKSI</button>
                    </form>
                </div>
            `,

            // --- AUTH ---
            handleLogin: async (e) => {
                e.preventDefault();
                const u = document.getElementById('login-user').value;
                const p = document.getElementById('login-pass').value;
                const b = document.getElementById('login-branch').value; // Ambil fallback branch
                
                APP.showLoader('LOGIN...');
                const data = await APP.callAPI({ action: 'login', username: u, password: p });
                APP.hideLoader();

                // Robust Unwrap Array from n8n
                let userData = null;
                if (Array.isArray(data) && data.length > 0) userData = data[0].json || data[0];
                else if (data && typeof data === 'object' && !Array.isArray(data)) userData = data.json || data;

                if (userData && userData.role) {
                    const userObj = {
                        username: userData.id_user_arena || userData.Users || u,
                        role: String(userData.role).toLowerCase().trim(),
                        branch: userData.cabang || userData.cabang_arena || b
                    };
                    localStorage.setItem('arena_user', JSON.stringify(userObj));
                    STATE.user = userObj;
                    APP.loadDashboard();
                } else {
                    alert('❌ Username/Password Salah atau tidak ditemukan.');
                }
            },

            logout: () => {
                localStorage.removeItem('arena_user');
                STATE.user = null;
                location.reload();
            },

            // --- ROUTING VIEWS ---
            loadDashboard: async () => {
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-admin').classList.add('hidden');
                document.getElementById('view-manager').classList.add('hidden');
                document.getElementById('view-owner').classList.add('hidden');

                document.getElementById('header-actions').classList.remove('hidden');
                document.getElementById('user-info-text').innerText = `${STATE.user.username.toUpperCase()} | ${STATE.user.role.toUpperCase()} | ${STATE.user.branch}`;
                
                APP.showLoader('TARIK DATA...');
                const data = await APP.callAPI({ action: 'get_dashboard', role: STATE.user.role, branch: STATE.user.branch });
                
                // Robust extraction: Extract multiple tables safely from n8n response
                let safeData = [];
                if (Array.isArray(data)) {
                    safeData = data.map(d => d.json !== undefined ? d.json : d);
                } else if (data && typeof data === 'object') {
                    safeData = data.data ? data.data : [data.json !== undefined ? data.json : data];
                }

                STATE.logs = safeData.filter(d => d.tagihan_arena !== undefined);
                STATE.expenses = safeData.filter(d => d.pengeluaran_arena !== undefined);

                APP.hideLoader();

                if (STATE.user.role === 'admin') APP.renderAdmin();
                else if (STATE.user.role === 'manager') APP.renderManager();
                else if (STATE.user.role === 'share holder' || STATE.user.role === 'owner') APP.renderOwner();
                else {
                    alert("Akses Role Tidak Dikenal.");
                    APP.logout();
                }
            },

            // --- ADMIN VIEW ---
            renderAdmin: () => {
                document.getElementById('view-admin').classList.remove('hidden');
                document.getElementById('admin-form-container').innerHTML = APP.getRentalFormHTML();
                
                const today = new Date().toISOString().split('T')[0];
                let d = new Date(); d.setDate(d.getDate() - 1);
                const yesterday = d.toISOString().split('T')[0];

                let omsetToday = 0; let omsetYest = 0;
                STATE.logs.forEach(log => {
                    if (log.cabang_arena === STATE.user.branch) {
                        const date = (log.jam_mulai_sewa || '').split(' ')[0];
                        if (date === today) omsetToday += Number(log.tagihan_arena);
                        if (date === yesterday) omsetYest += Number(log.tagihan_arena);
                    }
                });

                document.getElementById('admin-omset-today').innerText = APP.formatRp(omsetToday);
                document.getElementById('admin-omset-yesterday').innerText = APP.formatRp(omsetYest);

                APP.updateFormPricing();
            },

            // --- MANAGER VIEW ---
            renderManager: () => {
                document.getElementById('view-manager').classList.remove('hidden');
                APP.switchTab(STATE.activeTab); // restore last active tab
            },

            switchTab: (tab) => {
                STATE.activeTab = tab;
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                document.getElementById(`tab-${tab}`).classList.add('active');
                
                const content = document.getElementById('manager-content');
                
                if (tab === 'dashboard') {
                    content.innerHTML = `<h2 class="text-xl font-black text-white mb-4" style="text-shadow: 1px 1px 0px #000;">LOG KONTROL UNIT</h2>
                        <div class="space-y-4 pb-10">${APP.generateLogCards()}</div>`;
                } else if (tab === 'input') {
                    content.innerHTML = APP.getRentalFormHTML();
                    APP.updateFormPricing();
                } else if (tab === 'expense') {
                    content.innerHTML = `
                        <div class="mario-card p-5 animate-pop">
                            <h2 class="text-xl font-black mb-4 border-b-4 border-black pb-2 text-center">INPUT PENGELUARAN</h2>
                            <form onsubmit="APP.submitExpense(event)" class="space-y-4">
                                <div><label class="block text-xs font-bold mb-1">NAMA ITEM</label><input type="text" id="exp-name" required class="mario-input"></div>
                                <div><label class="block text-xs font-bold mb-1">BIAYA (Rp)</label><input type="number" id="exp-amount" required class="mario-input"></div>
                                <div><label class="block text-xs font-bold mb-1">TANGGAL</label><input type="date" id="exp-date" required class="mario-input" value="${new Date().toISOString().split('T')[0]}"></div>
                                <button type="submit" class="w-full mario-btn bg-red-500 text-white p-3">💸 SIMPAN PENGELUARAN</button>
                            </form>
                        </div>
                    `;
                } else if (tab === 'report') {
                    content.innerHTML = `
                        <div class="mario-card p-5 text-center animate-pop">
                            <h2 class="text-xl font-black mb-4">CETAK LAPORAN</h2>
                            <button onclick="APP.printReport()" class="w-full mario-btn bg-black text-white p-4 text-lg mb-4">🖨️ CETAK A4 (HARI INI)</button>
                        </div>
                    `;
                }
            },

            // --- OWNER VIEW ---
            renderOwner: () => {
                document.getElementById('view-owner').classList.remove('hidden');
                APP.renderOwnerLogs();
            },
            
            renderOwnerLogs: () => {
                const filter = document.getElementById('owner-filter-cabang').value;
                const today = new Date().toISOString().split('T')[0];
                const thisMonth = today.substring(0,7);

                let omsetToday = 0; let omsetMonth = 0;
                let logHTML = '';

                // Reverse so newest is on top
                const reversedLogs = [...STATE.logs].reverse();

                reversedLogs.forEach(log => {
                    if (filter === 'ALL' || log.cabang_arena === filter) {
                        const dateRaw = log.jam_mulai_sewa || '';
                        const date = dateRaw.split(' ')[0];
                        const month = date.substring(0,7);

                        if (date === today) omsetToday += Number(log.tagihan_arena);
                        if (month === thisMonth) omsetMonth += Number(log.tagihan_arena);

                        logHTML += `
                            <div class="bg-white p-3 rounded-xl border-2 border-black flex justify-between items-center shadow-[2px_2px_0px_#000]">
                                <div><p class="font-bold text-sm">${log.nama_pelanggan_arena} (${log.unit_arena})</p><p class="text-xs text-gray-500">${log.paket_arena} | ${dateRaw.substring(11,16)}</p></div>
                                <div class="font-black text-green-600">${APP.formatRp(log.tagihan_arena)}</div>
                            </div>
                        `;
                    }
                });

                document.getElementById('owner-omset-today').innerText = APP.formatRp(omsetToday);
                document.getElementById('owner-omset-month').innerText = APP.formatRp(omsetMonth);
                document.getElementById('owner-log-list').innerHTML = logHTML || '<p class="text-center text-white font-bold">Belum ada transaksi.</p>';
            },

            // --- RENTAL FORM LOGIC ---
            updateFormPricing: () => {
                const typeEl = document.getElementById('rent-type');
                const prodEl = document.getElementById('rent-product');
                if(!typeEl || !prodEl) return;

                const items = CONFIG.PRICING[typeEl.value] || [];
                prodEl.innerHTML = items.map((item, idx) => `<option value="${idx}">${item.name} ${item.time!=='Bebas'?'('+item.time+')':''}</option>`).join('');
                
                APP.updatePriceOnSelect();
            },
            updatePriceOnSelect: () => {
                const items = CONFIG.PRICING[document.getElementById('rent-type').value] || [];
                const idx = document.getElementById('rent-product').value;
                if(items[idx]) {
                    STATE.selectedRentPrice = items[idx].price;
                    document.getElementById('rent-price-display').innerText = APP.formatRp(STATE.selectedRentPrice);
                }
            },
            submitRental: async (e) => {
                e.preventDefault();
                const selProd = document.getElementById('rent-product');
                const prodName = selProd.options[selProd.selectedIndex].text;

                const payload = {
                    action: "input_rental",
                    name: document.getElementById('rent-name').value,
                    wa: document.getElementById('rent-wa').value,
                    price: STATE.selectedRentPrice,
                    admin_name: STATE.user.username,
                    branch: STATE.user.branch,
                    unit: document.getElementById('rent-unit').value,
                    paket: `${prodName} (${document.getElementById('rent-type').value})`,
                    status_unit: "booked",
                    jam_mulai_sewa: new Date().toISOString().replace('T', ' ').substring(0,19),
                    pembayaran: document.getElementById('rent-payment').value
                };

                APP.showLoader('MENYIMPAN...');
                await APP.callAPI(payload);
                await APP.loadDashboard(); // Refresh data
            },

            // --- MANAGER ACTIONS ---
            generateLogCards: () => {
                let html = '';
                // Reverse to show newest on top
                [...STATE.logs].reverse().forEach(log => {
                    if (log.cabang_arena === STATE.user.branch) {
                        const bgStat = log.status_unit_arena === 'playing' ? 'bg-green-100' : log.status_unit_arena === 'finished' ? 'bg-gray-200' : 'bg-white';
                        const rowId = log.id || log.row_number || log._rowIndex; // Handle different NocoDB/Sheets ID formats
                        
                        html += `
                        <div class="mario-card p-4 ${bgStat} text-sm">
                            <div class="flex justify-between border-b-2 border-black pb-2 mb-2">
                                <span class="font-black bg-black text-white px-2 rounded">${log.unit_arena}</span>
                                <span class="font-bold text-gray-500">${log.jam_mulai_sewa}</span>
                            </div>
                            <p class="font-bold text-lg uppercase">${log.nama_pelanggan_arena} <a href="${log.link_wa_pelanggan_arena}" target="_blank" class="text-blue-500">💬</a></p>
                            <p class="mb-3 font-semibold text-gray-700">${log.paket_arena} <br> <span class="text-orange-600">${APP.formatRp(log.tagihan_arena)}</span></p>
                            
                            <div class="flex gap-2 bg-gray-100 p-2 rounded-lg border-2 border-gray-300">
                                <div class="flex-1">
                                    <label class="text-[10px] font-bold">STATUS:</label>
                                    <select id="stat-${rowId}" class="mario-input p-1 text-xs w-full">
                                        <option value="booked" ${log.status_unit_arena==='booked'?'selected':''}>BOOKED</option>
                                        <option value="playing" ${log.status_unit_arena==='playing'?'selected':''}>PLAYING</option>
                                        <option value="finished" ${log.status_unit_arena==='finished'?'selected':''}>FINISHED</option>
                                    </select>
                                </div>
                                <div class="flex-1">
                                    <label class="text-[10px] font-bold">BAYAR:</label>
                                    <select id="pay-${rowId}" class="mario-input p-1 text-xs w-full">
                                        <option value="Lunas" ${log.pembayaran==='Lunas'?'selected':''}>LUNAS</option>
                                        <option value="Belum" ${log.pembayaran!=='Lunas'?'selected':''}>BELUM</option>
                                    </select>
                                </div>
                                <div class="flex items-end">
                                    <button onclick="APP.updateStatus('${rowId}')" class="mario-btn bg-yellow-400 p-2 text-sm shadow-sm">💾</button>
                                </div>
                            </div>
                        </div>`;
                    }
                });
                return html || '<p class="text-center text-white font-bold">Tidak ada data unit.</p>';
            },

            updateStatus: async (id) => {
                if(!id || id === 'undefined') return alert("Gagal mengambil ID Baris Data.");
                const stat = document.getElementById(`stat-${id}`).value;
                const pay = document.getElementById(`pay-${id}`).value;
                
                APP.showLoader('UPDATE...');
                await APP.callAPI({ action: 'update_status', row_id: id, status_unit: stat, pembayaran: pay });
                await APP.loadDashboard();
            },

            submitExpense: async (e) => {
                e.preventDefault();
                APP.showLoader('MENYIMPAN...');
                await APP.callAPI({
                    action: 'add_expense',
                    expense_name: document.getElementById('exp-name').value,
                    expense_amount: document.getElementById('exp-amount').value,
                    expense_date: document.getElementById('exp-date').value,
                    branch: STATE.user.branch
                });
                await APP.loadDashboard();
            },

            // --- REPORT A4 PRINT ---
            printReport: () => {
                const today = new Date().toISOString().split('T')[0];
                let rowHTML = ''; let totalOmset = 0;
                
                STATE.logs.forEach(log => {
                    if (log.cabang_arena === STATE.user.branch && (log.jam_mulai_sewa||'').includes(today)) {
                        totalOmset += Number(log.tagihan_arena);
                        rowHTML += `<tr><td style="border:1px solid #000; padding:8px;">${log.unit_arena}</td><td style="border:1px solid #000; padding:8px;">${log.nama_pelanggan_arena}</td><td style="border:1px solid #000; padding:8px;">${log.paket_arena}</td><td style="border:1px solid #000; padding:8px; text-align:right;">${APP.formatRp(log.tagihan_arena)}</td></tr>`;
                    }
                });

                document.getElementById('print-area').innerHTML = `
                    <h1 style="text-align:center; font-size:24px; margin-bottom:5px;">LAPORAN HARIAN OMSET</h1>
                    <h2 style="text-align:center; font-size:18px; margin-bottom:20px;">ARENA PLAYBOX - ${STATE.user.branch}</h2>
                    <p style="margin-bottom:10px; font-weight:bold;">Tanggal: ${today} <br> Dicetak Oleh: ${STATE.user.username.toUpperCase()}</p>
                    <table style="width:100%; border-collapse: collapse; text-align:left; font-size:14px;">
                        <tr style="background:#eee;"><th style="border:1px solid #000; padding:8px;">Unit</th><th style="border:1px solid #000; padding:8px;">Pelanggan</th><th style="border:1px solid #000; padding:8px;">Sewa</th><th style="border:1px solid #000; padding:8px; text-align:right;">Tagihan</th></tr>
                        ${rowHTML}
                        <tr><td colspan="3" style="border:1px solid #000; padding:10px; text-align:right; font-weight:bold; font-size:16px;">TOTAL OMSET HARI INI</td><td style="border:1px solid #000; padding:10px; text-align:right; font-weight:bold; font-size:16px;">${APP.formatRp(totalOmset)}</td></tr>
                    </table>
                `;
                
                document.getElementById('print-area').classList.remove('hidden');
                window.print();
                document.getElementById('print-area').classList.add('hidden');
            }
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', APP.init);

    </script>
</body>
</html>
