<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARENA SYSTEM V5.6 - Corporate Dividend Edition</title>
    
    <link rel="icon" href="https://raw.githubusercontent.com/sunsetdansenja-arch/bot-arrena-assets/main/logo%20arena%20gaming.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --mario-orange: #FF6B00; --mario-black: #000000; --mario-yellow: #FFD700; }
        body { font-family: 'Fredoka', sans-serif; background-color: var(--mario-orange); color: var(--mario-black); -webkit-font-smoothing: antialiased; background-image: radial-gradient(rgba(0,0,0,0.05) 2px, transparent 2px); background-size: 20px 20px; }
        .mario-card { background-color: white; border: 4px solid var(--mario-black); border-radius: 16px; box-shadow: 6px 6px 0px 0px var(--mario-black); }
        .mario-btn { background-color: white; border: 4px solid var(--mario-black); border-radius: 12px; box-shadow: 4px 4px 0px 0px var(--mario-black); transition: all 0.1s ease-in-out; font-weight: 700; text-align: center; cursor: pointer; text-decoration: none; }
        .mario-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px var(--mario-black); }
        .mario-input { width: 100%; background-color: #F3F4F6; border: 3px solid var(--mario-black); border-radius: 8px; padding: 10px; font-weight: 600; outline: none; }
        .mario-input:focus { border-color: var(--mario-orange); background-color: white; }
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 448px; background: white; border-top: 4px solid var(--mario-black); display: flex; justify-content: space-around; padding: 10px 0; z-index: 50; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; font-weight: bold; color: gray; cursor: pointer; }
        .nav-item.active { color: var(--mario-orange); text-shadow: 1px 1px 0px black; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }
        #loader { position: fixed; inset: 0; background: rgba(255,107,0,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 50px; height: 50px; border: 6px solid var(--mario-black); border-top-color: var(--mario-yellow); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .animate-pop { animation: popIn 0.3s forwards; }
        @keyframes popIn { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; display: block; position: absolute; top:0; left:0; width:100%; background:white; } }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; display: flex; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(4px); }
        .font-beuna { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="pb-24">

    <div id="loader" class="hidden">
        <div class="spinner mb-4"></div>
        <h2 id="loader-text" class="text-xl font-black text-white">SINKRONISASI...</h2>
    </div>

    <header class="max-w-md mx-auto flex justify-between items-center bg-black p-4 sticky top-0 z-40 border-b-4 border-yellow-400">
        <div>
            <h1 class="text-lg font-black text-white">ARENA SYSTEM</h1>
            <p id="user-info-text" class="text-[10px] font-bold text-yellow-400">V5.6 | Silakan Login</p>
        </div>
        <div id="header-actions" class="hidden flex gap-2">
            <button onclick="APP.loadDashboard()" class="bg-blue-500 text-white p-2 rounded-lg border-2 border-white">🔄</button>
            <button onclick="APP.logout()" class="bg-red-500 text-white p-2 rounded-lg border-2 border-white">🚪 Keluar</button>
        </div>
    </header>

    <main id="app" class="max-w-md mx-auto p-4 mt-2 animate-pop">
        
        <section id="view-login" class="mario-card p-6">
            <h2 class="text-xl font-black mb-6 text-center border-b-4 border-black pb-2 uppercase">Akses Sistem</h2>
            <form id="form-login" class="space-y-4">
                <div><label class="text-xs font-bold">USERNAME</label><input type="text" id="login-user" required class="mario-input"></div>
                <div><label class="text-xs font-bold">PASSWORD</label><input type="password" id="login-pass" required class="mario-input"></div>
                <button type="submit" class="w-full mario-btn bg-[#FFD700] p-4 text-lg mt-4">MASUK 🚀</button>
            </form>
        </section>

        <section id="view-main" class="hidden">
            <div id="main-content" class="pb-10 space-y-4"></div>
        </section>

        <section id="view-owner" class="hidden space-y-4">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="mario-card p-4 bg-black text-center text-white">
                    <p class="text-[9px] font-bold text-gray-400">OMSET BULAN INI</p>
                    <p id="owner-omset-month" class="text-xl font-black text-yellow-400">Rp 0</p>
                </div>
                <div class="mario-card p-4 bg-[#FFE8B3] text-center">
                    <p class="text-[9px] font-bold text-gray-600">OMSET HARI INI</p>
                    <p id="owner-omset-today" class="text-xl font-black text-[#FF6B00]">Rp 0</p>
                </div>
            </div>
            <div class="bg-black text-white p-2 rounded-lg text-center border-2 border-white mb-2">
                <p class="text-xs font-bold uppercase">RIWAYAT TRANSAKSI BULAN INI</p>
            </div>
            <div id="owner-logs" class="space-y-3 pb-6"></div>
        </section>

    </main>

    <div id="modal-cancel" class="modal-overlay hidden">
        <div class="mario-card p-6 w-full max-w-sm animate-pop">
            <h2 class="text-xl font-black mb-4 text-center border-b-2 border-black pb-2 text-red-600 uppercase">Batalkan Pesanan ❌</h2>
            <div class="space-y-3">
                <label class="text-xs font-bold block">Pilih Alasan Batal:</label>
                <select id="cancel-reason" class="mario-input p-2 text-sm" onchange="APP.toggleCancelOther()">
                    <option value="Telat Respon">Telat Respon (Customer Hilang)</option>
                    <option value="Unit Full">Unit Full / Habis</option>
                    <option value="Request Customer">Permintaan Customer (Ganti Jadwal dll)</option>
                    <option value="Lainnya">Lainnya (Ketik Manual)</option>
                </select>
                <input type="text" id="cancel-other" class="mario-input p-2 text-sm hidden" placeholder="Ketik alasan spesifik...">
                <div class="flex gap-2 mt-4">
                    <button onclick="APP.closeModal('modal-cancel')" class="mario-btn bg-gray-200 text-gray-700 p-3 flex-1 text-sm border-gray-400">Kembali</button>
                    <button onclick="APP.confirmCancel()" class="mario-btn bg-red-600 text-white p-3 flex-1 text-sm border-red-800">Batalkan</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-payment" class="modal-overlay hidden">
        <div class="mario-card p-6 w-full max-w-sm animate-pop text-center">
            <h2 class="text-xl font-black mb-4 border-b-2 border-black pb-2 text-green-600 uppercase">Pembayaran 💰</h2>
            <p class="text-xs font-bold text-gray-600 mb-4">Pilih metode lunas customer:</p>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="APP.confirmPayment('Cash')" class="mario-btn bg-green-400 text-black p-4 text-sm border-green-700 hover:bg-green-500">💵 CASH</button>
                <button onclick="APP.confirmPayment('Transfer')" class="mario-btn bg-blue-500 text-white p-4 text-sm border-blue-800 hover:bg-blue-600">📱 TRANSFER</button>
            </div>
            <button onclick="APP.closeModal('modal-payment')" class="w-full text-xs font-bold text-gray-500 underline mt-2">Batal, Nanti Saja</button>
        </div>
    </div>

    <nav id="bottom-nav" class="bottom-nav hidden">
        <div class="nav-item active" onclick="APP.switchTab('logs')" id="tab-logs"><span class="nav-icon">🎮</span>LOGS</div>
        <div class="nav-item" onclick="APP.switchTab('input')" id="tab-input"><span class="nav-icon">📝</span>INPUT</div>
        <div class="nav-item hidden" onclick="APP.switchTab('omset')" id="tab-omset"><span class="nav-icon">📈</span>OMSET</div>
        <div class="nav-item hidden" onclick="APP.switchTab('expense')" id="tab-expense"><span class="nav-icon">💸</span>BIAYA</div>
        <div class="nav-item hidden" onclick="APP.switchTab('report')" id="tab-report"><span class="nav-icon">📊</span>REPORT</div>
    </nav>

    <div id="print-area" class="hidden"></div>

    <script>
        const CONFIG = {
            WEBHOOK_URL: "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/86cee1b8-b00d-4aa6-8ff4-23735dc9afe1", 
            PRICING: {
                Paket: [ { name: "Malam", price: 50000 }, { name: "Pagi", price: 45000 }, { name: "Sore", price: 45000 }, { name: "Sultan 24H", price: 115000 } ],
                Regular: [ { name: "3 Jam", price: 30000 }, { name: "4 Jam", price: 40000 }, { name: "5 Jam", price: 50000 } ]
            }
        };

        const STATE = { 
            user: null, logs: [], expenses: [], activeTab: 'logs', lastFinalPrice: 0,
            activeModalRowId: null, activeModalStat: null, activeModalUnit: null, activeModalPay: null
        };

        const APP = {
            init: () => {
                document.getElementById('form-login').addEventListener('submit', APP.handleLogin);
                const saved = localStorage.getItem('arena_user_v56');
                if (saved) { STATE.user = JSON.parse(saved); APP.loadDashboard(); }
            },
            showLoader: (t) => { document.getElementById('loader-text').innerText = t; document.getElementById('loader').classList.remove('hidden'); },
            hideLoader: () => document.getElementById('loader').classList.add('hidden'),
            formatRp: (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n || 0),
            
            getTodayStr: () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; },
            getYesterdayStr: () => { const d = new Date(); d.setDate(d.getDate()-1); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; },
            getTomorrowStr: () => { const d = new Date(); d.setDate(d.getDate()+1); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; },
            getMonthStr: () => { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().substring(0,7); },
            
            generateMonthOptions: () => {
                const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
                let opts = '';
                for(let i=0; i<12; i++) {
                    let d = new Date(); d.setMonth(d.getMonth() - i);
                    opts += `<option value="${d.toISOString().substring(0,7)}">${monthNames[d.getMonth()]} ${d.getFullYear()}</option>`;
                }
                return opts;
            },

            getUnitStatus: (uNum) => {
                const todayStr = APP.getTodayStr(); const tomorrowStr = APP.getTomorrowStr(); const yestStr = APP.getYesterdayStr();
                const unitLogs = STATE.logs.filter(l => {
                    const logNum = String(l.unit_arena).replace(/\D/g, ''); 
                    const dStr = (l.jam_mulai_sewa||'').substring(0,10);
                    return logNum === String(uNum) && (dStr === todayStr || dStr === tomorrowStr || dStr === yestStr);
                });
                const isPlaying = unitLogs.some(l => ['playing', 'main'].includes(String(l.status_unit_arena).toLowerCase()));
                const isBooked = unitLogs.some(l => ['booked', 'book'].includes(String(l.status_unit_arena).toLowerCase()));
                if (isPlaying) return 'main';
                if (isBooked) return 'book';
                return 'kosong';
            },

            generateUnitOptionsHtml: (branch) => {
                let units = [];
                let b = String(branch).toLowerCase();
                if(b.includes('sabang')) units = [1, 2];
                else if(b.includes('banda')) units = [3, 4, 5, 6, 7];
                else if(b.includes('timur') || b.includes('atim')) units = [8, 9];
                else units = [1];

                return units.map(u => {
                    const stat = APP.getUnitStatus(u);
                    let label = `Unit ${u}`;
                    if (stat === 'main' || stat === 'book') { label += ` 🔴 (Terisi)`; } 
                    else { label += ` 🟢 (Kosong)`; }
                    return `<option value="${u}">${label}</option>`;
                }).join('');
            },

            api: async (p) => {
                try {
                    const r = await fetch(CONFIG.WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: p.action, data: p }) });
                    if (!r.ok) return [];
                    const txt = await r.text(); return txt ? JSON.parse(txt) : [];
                } catch (e) { return null; }
            },

            handleLogin: async (e) => {
                e.preventDefault();
                APP.showLoader('VERIFIKASI...');
                const data = await APP.api({ action: 'login', username: document.getElementById('login-user').value, password: document.getElementById('login-pass').value });
                APP.hideLoader();
                
                if (data === null) { alert("❌ Gagal Terhubung! Cek koneksi."); return; }
                let rawUser = Array.isArray(data) ? (data[0]?.json || data[0]) : (data?.json || data);
                
                if (rawUser && rawUser.role) {
                    let roleStr = String(rawUser.role).toLowerCase().trim();
                    let uType = roleStr; let uBranch = "Semua Cabang"; 
                    if(roleStr.startsWith('sh')) {
                        uType = 'owner';
                        if(roleStr.includes('sabang')) uBranch = 'Sabang';
                        else if(roleStr.includes('banda')) uBranch = 'Banda'; 
                        else if(roleStr.includes('atim') || roleStr.includes('aceh timur')) uBranch = 'Aceh Timur';
                    } else {
                        if(rawUser.cabang_arena || rawUser.cabang) uBranch = rawUser.cabang_arena || rawUser.cabang;
                    }
                    STATE.user = { username: rawUser.id_user_arena || rawUser.Users || 'User', userType: uType, branch: uBranch };
                    localStorage.setItem('arena_user_v56', JSON.stringify(STATE.user));
                    APP.loadDashboard();
                } else { alert("❌ Gagal Login. Periksa Username/Password."); }
            },
            logout: () => { localStorage.removeItem('arena_user_v56'); location.reload(); },

            loadDashboard: async () => {
                APP.showLoader('SINKRONISASI...');
                const reqBranch = (STATE.user.userType === 'admin' || STATE.user.userType === 'manager') ? 'ALL' : STATE.user.branch;
                const res = await APP.api({ action: 'get_dashboard', role: STATE.user.userType, branch: reqBranch });
                APP.hideLoader();

                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('header-actions').classList.remove('hidden');
                
                const roleDisplay = STATE.user.userType === 'owner' ? 'SHARE HOLDER' : STATE.user.userType;
                document.getElementById('user-info-text').innerText = `${STATE.user.username.toUpperCase()} | ${roleDisplay.toUpperCase()}`;

                let raw = Array.isArray(res) ? res.map(i => i.json !== undefined ? i.json : i) : [];
                STATE.logs = raw.filter(i => i.tagihan_arena !== undefined);
                STATE.expenses = raw.filter(i => i.pengeluaran_arena !== undefined);

                if (STATE.user.userType === 'owner') { APP.renderOwner(); } 
                else {
                    document.getElementById('bottom-nav').classList.remove('hidden');
                    document.getElementById('view-main').classList.remove('hidden');
                    if (STATE.user.userType === 'manager') {
                        document.getElementById('tab-omset').classList.remove('hidden');
                        document.getElementById('tab-expense').classList.remove('hidden');
                        document.getElementById('tab-report').classList.remove('hidden');
                    }
                    APP.switchTab(STATE.activeTab);
                }
            },

            switchTab: (tab) => {
                STATE.activeTab = tab;
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                document.getElementById(`tab-${tab}`).classList.add('active');
                
                const container = document.getElementById('main-content');
                if (tab === 'logs') { container.innerHTML = APP.renderLogsUI(); }
                else if (tab === 'input') { container.innerHTML = APP.renderInputForm(); APP.updateUnitOptions(); APP.updatePrice(); }
                else if (tab === 'omset') { container.innerHTML = APP.renderOmsetTab(); }
                else if (tab === 'expense') { container.innerHTML = APP.renderExpenseForm(); }
                else if (tab === 'report') { container.innerHTML = APP.renderReportTab(); APP.updateReportPreview(); }
            },

            closeModal: (id) => document.getElementById(id).classList.add('hidden'),
            
            toggleCancelOther: () => {
                const val = document.getElementById('cancel-reason').value;
                document.getElementById('cancel-other').classList.toggle('hidden', val !== 'Lainnya');
            },

            showCancelModal: (id, pay, unit) => {
                STATE.activeModalRowId = id; STATE.activeModalPay = pay; STATE.activeModalUnit = unit;
                document.getElementById('cancel-reason').value = 'Telat Respon';
                document.getElementById('cancel-other').value = '';
                document.getElementById('cancel-other').classList.add('hidden');
                document.getElementById('modal-cancel').classList.remove('hidden');
            },

            confirmCancel: async () => {
                let reason = document.getElementById('cancel-reason').value;
                if (reason === 'Lainnya') reason = document.getElementById('cancel-other').value || 'Alasan tidak disebutkan';
                APP.closeModal('modal-cancel');
                APP.showLoader('MEMBATALKAN...');
                await APP.api({ action: 'update_status', row_id: STATE.activeModalRowId, status_unit: 'batal', pembayaran: STATE.activeModalPay, unit: STATE.activeModalUnit, admin_name: STATE.user.username, keterangan: reason });
                await APP.loadDashboard();
            },

            handleStatusChange: (selectEl, id, pay, unit) => {
                const newVal = selectEl.value;
                if (newVal === 'batal') {
                    selectEl.value = selectEl.getAttribute('data-old-value'); 
                    APP.showCancelModal(id, pay, unit); 
                } else {
                    APP.showLoader('UPDATE STATUS...');
                    APP.api({ action: 'update_status', row_id: id, status_unit: newVal, pembayaran: pay, unit: unit, admin_name: STATE.user.username, keterangan: '' })
                       .then(() => APP.loadDashboard());
                }
            },

            handlePaymentClick: (id, currentStat, currentPay, currentUnit) => {
                if (currentPay === 'Belum') {
                    STATE.activeModalRowId = id; STATE.activeModalStat = currentStat; STATE.activeModalUnit = currentUnit;
                    document.getElementById('modal-payment').classList.remove('hidden');
                } else {
                    APP.showLoader('UPDATE BAYAR...');
                    APP.api({ action: 'update_status', row_id: id, status_unit: currentStat, pembayaran: 'Belum', unit: currentUnit, admin_name: STATE.user.username, keterangan: '' })
                       .then(() => APP.loadDashboard());
                }
            },

            confirmPayment: async (method) => {
                APP.closeModal('modal-payment');
                APP.showLoader('UPDATE BAYAR...');
                await APP.api({ action: 'update_status', row_id: STATE.activeModalRowId, status_unit: STATE.activeModalStat, pembayaran: `Lunas ${method}`, unit: STATE.activeModalUnit, admin_name: STATE.user.username, keterangan: '' });
                await APP.loadDashboard();
            },

            createMiniLogCard: (l, colorClass, badgeText) => {
                const cabLabel = l.cabang_arena === 'Banda' ? 'Banda Aceh' : l.cabang_arena;
                const ketText = l.keterangan || l.keterangan_arena || ''; 
                const reasonText = ketText ? `<p class="text-[9px] font-bold text-red-500 italic mt-0.5 border-t border-red-200 pt-0.5">"${ketText}"</p>` : '';
                return `
                <div class="border-2 border-black p-3 rounded-lg bg-white shadow-[2px_2px_0px_#000] mb-2 flex justify-between items-center">
                    <div>
                        <p class="font-black text-xs uppercase">${l.nama_pelanggan_arena} <span class="bg-gray-200 px-1 rounded text-[9px] ml-1">${l.unit_arena}</span></p>
                        <p class="text-[9px] text-gray-500 font-bold">${(l.jam_mulai_sewa||'').substring(0,16)} | ${cabLabel}</p>
                        ${reasonText}
                    </div>
                    <div class="text-right">
                        <p class="font-black text-sm ${colorClass}">${APP.formatRp(l.tagihan_arena)}</p>
                        <p class="text-[9px] font-bold text-gray-500 bg-gray-100 rounded-sm px-1 inline-block mt-0.5">${badgeText}</p>
                    </div>
                </div>`;
            },

            renderOmsetTab: () => {
                const todayStr = APP.getTodayStr(); const yestStr = APP.getYesterdayStr(); const monthStr = APP.getMonthStr();
                let data = { ALL: { t: 0, y: 0, m: 0 }, 'Sabang': { t: 0, y: 0, m: 0 }, 'Banda': { t: 0, y: 0, m: 0 }, 'Aceh Timur': { t: 0, y: 0, m: 0 } };
                
                let lostIncome = 0; let cancelStats = {};
                let successHtml = ''; let cancelHtml = '';

                const reversedLogs = [...STATE.logs].reverse();
                reversedLogs.forEach(l => {
                    const stat = String(l.status_unit_arena).toLowerCase();
                    const val = Number(l.tagihan_arena) || 0;
                    const dateStr = (l.jam_mulai_sewa || '').substring(0,10);
                    const mStr = (l.jam_mulai_sewa || '').substring(0,7);
                    const branch = l.cabang_arena === 'Banda Aceh' ? 'Banda' : l.cabang_arena;
                    const canceler = l.Users || 'Sistem';

                    if (mStr === monthStr) {
                        if (stat === 'batal') {
                            lostIncome += val;
                            if(!cancelStats[canceler]) cancelStats[canceler] = { count: 0, total: 0 };
                            cancelStats[canceler].count++; cancelStats[canceler].total += val;
                            cancelHtml += APP.createMiniLogCard(l, 'text-red-600 line-through', 'BATAL ❌');
                        } 
                        else if (stat !== 'pending') {
                            data.ALL.m += val; if (data[branch]) data[branch].m += val;
                            if (dateStr === todayStr) { data.ALL.t += val; if (data[branch]) data[branch].t += val; }
                            if (dateStr === yestStr) { data.ALL.y += val; if (data[branch]) data[branch].y += val; }
                            
                            let badge = stat === 'playing' || stat === 'main' ? '🟢 PLAYING' : (stat === 'booked' ? '⏳ BOOKED' : '✅ FINISHED');
                            let color = stat === 'playing' || stat === 'main' ? 'text-green-600' : 'text-[#FF6B00]';
                            successHtml += APP.createMiniLogCard(l, color, badge);
                        }
                    }
                });

                let cancelStatsHtml = Object.keys(cancelStats).map(k => `
                    <div class="flex justify-between items-center bg-red-100 p-2 rounded border border-red-300">
                        <span class="font-black text-xs text-red-800 uppercase">👤 ${k}</span>
                        <span class="font-black text-xs text-red-600">${cancelStats[k].count}x (${APP.formatRp(cancelStats[k].total)})</span>
                    </div>
                `).join('') || '<p class="text-[10px] text-gray-500 italic text-center">Belum ada pembatalan.</p>';

                return `

                return filtered.reverse().map(l => {

                                <span class="font-black text-xl text-[#FF6B00] leading-none mb-1 ${textClass}">${dayStr}</span>

                            <span class="font-black text-[10px] bg-black text-white px-2 py-1 rounded-md h-fit mt-1">${unitLabel} (${cabLabel})</span>

                        <p class="font-bold text-sm uppercase ${textClass}">${l.nama_pelanggan_arena} <span class="text-[10px] text-gray-500 normal-case ml-1">${l.nomor_pelanggan_arena || ''}</span></p>

                            <select data-old-value="${stat}" onchange="APP.handleStatusChange(this, '${rowId}', '${l.pembayaran}', '${l.unit_arena}')" class="mario-input p-1 text-[9px] w-1/3 font-bold">

                                ${payBtnText}

                                💬 WA

                        </div>
                    </div>`;

                if(!unitSel) return;
                
                if (branch === 'Banda') { logistikBox.classList.remove('hidden'); } 
                else { logistikBox.classList.add('hidden'); document.getElementById('r-ongkir').value = 0; document.getElementById('r-delivery').value = 'ambil'; }

                unitSel.innerHTML = APP.generateUnitOptionsHtml(branch);
                APP.updatePrice();
            },

            updatePrice: () => {
                const type = document.getElementById('r-type').value;
                const prodSel = document.getElementById('r-prod');
                
                const deliveryMode = document.getElementById('r-delivery') ? document.getElementById('r-delivery').value : 'ambil';
                const ongkirInput = document.getElementById('r-ongkir');
                if (ongkirInput) ongkirInput.classList.toggle('hidden', deliveryMode !== 'antar');
                if (deliveryMode === 'ambil' && ongkirInput) ongkirInput.value = 0;
                
                if(prodSel.options.length === 0 || document.getElementById('r-type').dataset.last !== type) {
                    prodSel.innerHTML = CONFIG.PRICING[type].map((p,i) => `<option value="${i}">${p.name} ${p.time!=='Bebas'?'('+p.time+')':''}</option>`).join('');
                    document.getElementById('r-type').dataset.last = type;
                }
                
                const basePrice = CONFIG.PRICING[type][prodSel.value].price;
                const diskonVal = Number(document.getElementById('r-diskon') ? document.getElementById('r-diskon').value : 0) || 0;
                const ongkirVal = Number(ongkirInput ? ongkirInput.value : 0) || 0;
                
                let finalCalc = basePrice - diskonVal + ongkirVal;
                if (finalCalc < 0) finalCalc = 0; 
                
                STATE.lastFinalPrice = finalCalc;
                document.getElementById('price-tag').innerText = APP.formatRp(finalCalc);
            },

            saveRental: async (e) => {
                e.preventDefault();
                APP.showLoader('MENYIMPAN...');
                try {
                    const type = document.getElementById('r-type').value;
                    const prodSel = document.getElementById('r-prod');
                    const rawDate = document.getElementById('r-datetime').value || ''; 
                    const formattedDate = rawDate ? rawDate.replace('T', ' ') + (rawDate.length === 16 ? ':00' : '') : '';
                    
                    const finalName = CONFIG.PRICING[type][prodSel.value].name;
                    const diskonVal = Number(document.getElementById('r-diskon').value) || 0;
                    const ongkirVal = Number(document.getElementById('r-ongkir') ? document.getElementById('r-ongkir').value : 0) || 0;
                    const payStatus = document.getElementById('r-pay-status').value;
                    
                    let finalPaket = `${finalName} (${type})`;
                    if (diskonVal > 0) { finalPaket += ` [Diskon ${APP.formatRp(diskonVal)}]`; }

                    await APP.api({
                        action: 'input_rental',
                        name: document.getElementById('r-name').value, wa: document.getElementById('r-wa').value, 
                        branch: document.getElementById('r-branch').value, unit: document.getElementById('r-unit').value,
                        price: STATE.lastFinalPrice, admin_name: STATE.user.username, status_unit: 'booked', pembayaran: payStatus,
                        paket: finalPaket, jam_mulai_sewa: formattedDate, ongkir: ongkirVal
                    });
                    await APP.loadDashboard();
                    APP.switchTab('logs'); 
                } catch (error) {
                    alert("Gagal memproses input.");
                    APP.hideLoader();
                }
            },

            saveExpense: async (e) => {
                e.preventDefault();
                APP.showLoader('MENYIMPAN...');
                await APP.api({ action: 'add_expense', expense_name: document.getElementById('exp-name').value, expense_amount: document.getElementById('exp-amount').value, expense_date: document.getElementById('exp-date').value, branch: document.getElementById('exp-branch').value });
                await APP.loadDashboard();
            },

            // --- FINANCIAL ENGINE (FRONT-END) ---
            calculateFinancials: (monthStr) => {
                let fin = {
                    'Banda': { gross: 0, expense: 0, dp_fee: 0, dp_comm: 0, net: 0, sh_name: 'Nibras', sh_pct: 0.40, sh_cut: 0, dimas_cut: 0, exp_logs: [], order_logs: [] },
                    'Sabang': { gross: 0, expense: 0, dp_fee: 150000, dp_comm: 0, net: 0, sh_name: 'Blok', sh_pct: 0.50, sh_cut: 0, dimas_cut: 0, exp_logs: [], order_logs: [] },
                    'Aceh Timur': { gross: 0, expense: 0, dp_fee: 100000, dp_comm: 0, net: 0, sh_name: 'Farid', sh_pct: 0.50, sh_cut: 0, dimas_cut: 0, exp_logs: [], order_logs: [] },
                    'ALL': { gross: 0, expense: 0, dp_total: 0, net: 0, dimas_total: 0, exp_logs: [], order_logs: [] }
                };

                STATE.logs.forEach(l => {
                    const m = (l.jam_mulai_sewa||'').substring(0,7);
                    const stat = String(l.status_unit_arena).toLowerCase();
                    let b = l.cabang_arena === 'Banda Aceh' ? 'Banda' : (l.cabang_arena === 'Atim' ? 'Aceh Timur' : l.cabang_arena);
                    
                    if (m === monthStr && !['batal', 'pending'].includes(stat) && fin[b]) {
                        let totalTagihan = (Number(l.tagihan_arena) || 0) + (Number(l.ongkir_arena || l.ongkir || 0));
                        fin[b].gross += totalTagihan;
                        fin[b].order_logs.push({...l, final_val: totalTagihan});
                        fin.ALL.order_logs.push({...l, final_val: totalTagihan, proper_branch: b});
                    }
                });

                if (fin['Sabang'].gross > 0 || STATE.expenses.some(e=>e.cabang_id_arena==='Sabang')) {
                    fin['Sabang'].dp_comm = fin['Sabang'].gross * 0.1;
                } else { fin['Sabang'].dp_fee = 0; }

                if (fin['Aceh Timur'].gross > 0 || STATE.expenses.some(e=>e.cabang_id_arena==='Aceh Timur' || e.cabang_id_arena==='Atim')) {
                    fin['Aceh Timur'].dp_comm = fin['Aceh Timur'].gross * 0.1;
                } else { fin['Aceh Timur'].dp_fee = 0; }

                STATE.expenses.forEach(e => {
                    const d = (e.tanggal_pengeluaran_arena || e.tanggal_pengeluaran || '').substring(0,7);
                    let b = e.cabang_id_arena === 'Banda Aceh' ? 'Banda' : (e.cabang_id_arena === 'Atim' ? 'Aceh Timur' : e.cabang_id_arena);
                    if (d === monthStr && fin[b]) {
                        let val = Number(e.jumlah_pengeluaran_arena || e.jumlah_pengeluaran || 0);
                        fin[b].expense += val;
                        fin[b].exp_logs.push(e);
                        fin.ALL.exp_logs.push({...e, proper_branch: b});
                    }
                });

                ['Banda', 'Sabang', 'Aceh Timur'].forEach(b => {
                    let total_exp = fin[b].expense + fin[b].dp_fee + fin[b].dp_comm;
                    fin[b].net = fin[b].gross - total_exp;
                    fin[b].sh_cut = fin[b].net * fin[b].sh_pct;
                    fin[b].dimas_cut = fin[b].net - fin[b].sh_cut;

                    fin.ALL.gross += fin[b].gross;
                    fin.ALL.expense += fin[b].expense;
                    fin.ALL.dp_total += (fin[b].dp_fee + fin[b].dp_comm);
                    fin.ALL.net += fin[b].net;
                    fin.ALL.dimas_total += fin[b].dimas_cut;
                });

                return fin;
            },

                            <table style="width:100%; font-size:12px;">
                                <tr><td style="padding-bottom:5px;">Omset Kotor</td><td style="text-align:right; font-weight:bold; color:green; padding-bottom:5px;">${APP.formatRp(bData.gross)}</td></tr>
                                <tr><td style="padding-bottom:5px;">Pengeluaran Manual</td><td style="text-align:right; font-weight:bold; color:red; padding-bottom:5px;">-${APP.formatRp(bData.expense)}</td></tr>
                                <tr><td style="padding-bottom:10px;">Biaya Drop Point (Sistem)</td><td style="text-align:right; font-weight:bold; color:red; padding-bottom:10px;">-${APP.formatRp(dpAmount)}</td></tr>
                                <tr><td colspan="2"><hr style="border-top:2px dashed #000; margin:0 0 10px 0;"></td></tr>
                                <tr style="font-size:16px;"><td style="font-weight:900;">LABA BERSIH</td><td style="text-align:right; font-weight:900;">${APP.formatRp(bData.net)}</td></tr>
                            </table>
                        </div>
                    </div>
                    `;

                    // Order Logs Table
                    let rowHTML = '';
                    bData.order_logs.forEach(l => {
                        let bLabel = type === 'ALL' ? `(${l.proper_branch}) ` : '';
                        rowHTML += `<tr><td style="border:1px solid #ccc; padding:6px;">${(l.jam_mulai_sewa||'').substring(0,10)}</td><td style="border:1px solid #ccc; padding:6px;">${bLabel}U${l.unit_arena}</td><td style="border:1px solid #ccc; padding:6px;">${l.nama_pelanggan_arena}</td><td style="border:1px solid #ccc; padding:6px; text-align:right; font-weight:bold;">${APP.formatRp(l.final_val)}</td></tr>`;
                    });

                    printHtml += `
                    <h3 style="font-size:14px; margin-bottom:10px; border-bottom:2px solid #000; display:inline-block;">Rincian Log Transaksi</h3>
                    <table style="width:100%; border-collapse: collapse; text-align:left; font-size:11px; margin-bottom:40px;">
                        <tr style="background:#000; color:#fff;"><th style="border:1px solid #000; padding:6px;">Tanggal</th><th style="border:1px solid #000; padding:6px;">Unit</th><th style="border:1px solid #000; padding:6px;">Pelanggan</th><th style="border:1px solid #000; padding:6px; text-align:right;">Tagihan (+Ongkir)</th></tr>
                        ${rowHTML || '<tr><td colspan="4" style="text-align:center; padding:10px;">Tidak ada transaksi di bulan ini.</td></tr>'}
                    </table>`;

                    printHtml += `
                    <div style="text-align: right; font-size: 12px;">
                        <p>Dicetak Oleh: <b>${STATE.user.username.toUpperCase()}</b></p>
                        <p>Waktu Cetak: ${printDate}</p>
                    </div>`;
                }

                // WATERMARK BEUNA AGENCY PADA HALAMAN PRINT A4
                printHtml += `
                    <div style="margin-top: 50px; text-align: center; border-top: 1px solid #e5e7eb; padding-top: 15px; font-family: 'Inter', sans-serif;">
                        <p style="font-size: 8px; color: #9ca3af; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; font-weight: bold;">System By</p>
                        <img src="https://raw.githubusercontent.com/sunsetdansenja-arch/beuna-agency/main/beuna%20logo%20png.png" alt="Beuna Agency" style="height: 16px; opacity: 0.8; filter: grayscale(100%);">
                    </div>
                </div>`;

                document.getElementById('print-area').innerHTML = printHtml;
                document.getElementById('print-area').classList.remove('hidden'); 
                window.print(); 
                document.getElementById('print-area').classList.add('hidden');
            },

            renderOwner: () => {
                document.getElementById('view-owner').classList.remove('hidden');
                const branchStr = STATE.user.branch; const todayStr = APP.getTodayStr(); const monthStr = APP.getMonthStr(); 
                let omsetToday = 0; let omsetMonth = 0;
                
                const ownerLogs = STATE.logs.filter(l => {
                    const dateStr = (l.jam_mulai_sewa || '').substring(0,10);
                    return (l.cabang_arena === branchStr || (branchStr==='Banda Aceh' && l.cabang_arena==='Banda')) && dateStr.startsWith(monthStr) && !['batal', 'pending'].includes(String(l.status_unit_arena).toLowerCase());
                });

                ownerLogs.forEach(l => {
                    if ((l.jam_mulai_sewa||'').substring(0,10) === todayStr) omsetToday += Number(l.tagihan_arena);
                    omsetMonth += Number(l.tagihan_arena);
                });

                document.getElementById('owner-omset-today').innerText = APP.formatRp(omsetToday); document.getElementById('owner-omset-month').innerText = APP.formatRp(omsetMonth);
                
                const daysName = ['MINGGU', 'SENIN', 'SELASA', 'RABU', 'KAMIS', 'JUMAT', 'SABTU'];
                document.getElementById('owner-logs').innerHTML = ownerLogs.reverse().map(l => {
                    let dayStr = '';
                    if (l.jam_mulai_sewa) {
                        const dObj = new Date(l.jam_mulai_sewa.replace(' ', 'T'));
                        if (!isNaN(dObj)) dayStr = daysName[dObj.getDay()];
                    }
                    return `
                    <div class="mario-card p-3 bg-white flex justify-between items-center text-xs">
                        <div>
                            <p class="font-black text-sm text-[#FF6B00] leading-none mb-1">${dayStr}</p>
                            <p class="font-black">${l.nama_pelanggan_arena} <span class="bg-gray-200 px-1 rounded text-[10px]">U${l.unit_arena}</span></p>
                            <p class="text-[10px] text-gray-500 font-bold">${(l.jam_mulai_sewa||'').substring(0,16)}</p>
                        </div>
                        <div class="text-right"><p class="font-black text-green-600">${APP.formatRp(l.tagihan_arena)}</p><p class="text-[10px] font-bold text-gray-400">${l.paket_arena}</p></div>
                    </div>`
                }).join('') || '<p class="text-center text-white font-bold">Tidak ada riwayat.</p>';
            }
        };
        APP.init();
    </script>
</body>
</html>
