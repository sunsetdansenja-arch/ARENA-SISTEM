<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Playbox System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
            color: #1d1d1f;
        }
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }
        .apple-card {
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .apple-input {
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }
        .apple-input:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 4px rgba(0, 102, 204, 0.1);
        }
        .btn-taktil {
            border-radius: 12px;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn-taktil:active {
            transform: scale(0.96);
        }
        /* Loader Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #e2e2e2 25%, #f0f0f0 50%, #e2e2e2 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .time-up-anim {
            animation: pulse-red 2s infinite;
        }
    </style>
</head>
<body class="p-4 md:p-8 antialiased">

    <div id="global-loader" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center bg-white/80 backdrop-blur-md">
        <div class="w-12 h-12 border-4 border-gray-200 border-t-black rounded-full animate-spin"></div>
        <p class="mt-4 text-sm font-medium text-gray-500" id="loader-text">Memuat data n8n...</p>
    </div>

    <div id="login-screen" class="max-w-sm mx-auto mt-20">
        <div class="glass apple-card p-8 text-center">
            <div class="w-16 h-16 bg-black rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <h1 class="text-2xl font-bold mb-2">Arena Playbox</h1>
            <p class="text-sm text-gray-500 mb-6">Masuk ke sistem operasional</p>
            
            <div class="space-y-4 text-left">
                <input type="text" id="login-user" placeholder="Nama Admin" class="w-full p-4 apple-input text-sm">
                <input type="password" id="login-pass" placeholder="Password" class="w-full p-4 apple-input text-sm">
                <button onclick="APP_LOGIC.login()" class="w-full bg-black text-white p-4 font-semibold btn-taktil mt-2">Masuk</button>
            </div>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden max-w-6xl mx-auto space-y-6">
        <div class="flex justify-between items-end glass apple-card p-6">
            <div>
                <p class="text-sm font-semibold text-gray-500 uppercase tracking-wider" id="dash-role">Admin</p>
                <h2 class="text-3xl font-bold mt-1" id="dash-name">Halo, -</h2>
                <p class="text-sm text-gray-500 mt-1">Cabang <span id="dash-branch" class="font-semibold text-black"></span></p>
            </div>
            <button onclick="location.reload()" class="text-red-500 font-medium btn-taktil px-4 py-2 bg-red-50 rounded-lg text-sm">Keluar</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
                <div class="glass apple-card p-6">
                    <h3 class="font-semibold mb-4 text-gray-800">Status Unit</h3>
                    <div id="unit-grid" class="grid grid-cols-2 sm:grid-cols-5 gap-3">
                        <div class="skeleton h-24 rounded-xl"></div>
                        <div class="skeleton h-24 rounded-xl"></div>
                    </div>
                </div>

                <div id="input-section" class="glass apple-card p-6">
                    <h3 class="font-semibold mb-4 text-gray-800">Sewa Baru</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="f-name" placeholder="Nama Pelanggan" class="p-3 apple-input text-sm">
                        <input type="number" id="f-wa" placeholder="No WA (08...)" class="p-3 apple-input text-sm">
                        
                        <select id="f-unit" class="p-3 apple-input text-sm bg-white"><option value="">Pilih Unit</option></select>
                        <select id="f-paket" onchange="APP_LOGIC.calculatePrice()" class="p-3 apple-input text-sm bg-white"><option value="">Pilih Paket</option></select>
                        
                        <div class="flex gap-2">
                            <select id="f-jam" class="p-3 apple-input text-sm w-1/2 bg-white">
                                <option value="">Jam</option>
                            </select>
                            <select id="f-menit" class="p-3 apple-input text-sm w-1/2 bg-white">
                                <option value="00">00</option><option value="15">15</option><option value="30">30</option><option value="45">45</option>
                            </select>
                        </div>
                        
                        <input type="number" id="f-price" placeholder="Tagihan (Rp)" class="p-3 apple-input text-sm font-semibold text-blue-600">
                        <input type="number" id="f-ongkir" placeholder="Ongkir (Khusus Banda)" class="p-3 apple-input text-sm hidden">
                    </div>
                    <button onclick="APP_LOGIC.submitRental()" class="w-full mt-6 bg-blue-600 text-white p-3 font-semibold btn-taktil">Simpan & Mulai</button>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass apple-card p-6 bg-gradient-to-br from-black to-gray-800 text-white border-none">
                    <p class="text-sm opacity-70">Omset Hari Ini (Kotor)</p>
                    <h2 id="dash-omset" class="text-4xl font-bold mt-2">Rp 0</h2>
                </div>

                <div id="manager-tools" class="hidden glass apple-card p-6 border border-orange-200 bg-orange-50/50">
                    <h3 class="font-semibold text-orange-800 mb-3">Menu Manager</h3>
                    <input type="text" id="ex-name" placeholder="Catatan Pengeluaran" class="w-full mb-2 p-2 apple-input text-sm">
                    <input type="number" id="ex-amount" placeholder="Nominal (Rp)" class="w-full mb-3 p-2 apple-input text-sm">
                    <button onclick="APP_LOGIC.submitExpense()" class="w-full bg-orange-500 text-white p-2 rounded-lg text-sm font-semibold btn-taktil">Simpan Pengeluaran</button>
                </div>

                <div class="glass apple-card p-6">
                    <h3 class="font-semibold mb-4 text-gray-800">Log Order (Hari Ini)</h3>
                    <div id="log-list" class="space-y-3 max-h-[400px] overflow-y-auto pr-2">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const CONFIG = {
            WEBHOOK_URL: 'https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/86cee1b8-b00d-4aa6-8ff4-23735dc9afe1',
            BRANCH_UNITS: {
                'Sabang': [1, 2],
                'Banda': [3, 4, 5, 6, 7],
                'Atim': [8, 9, 10]
            }
        };

        // ==========================================
        // APP STATE (Data Store)
        // ==========================================
        const APP_STATE = {
            user: null, // { name, role, branch }
            priceList: [], // Array of packages
            logs: [], // Array of today's active rentals
            expenses: [], // Array of expenses
            timers: {} // Store setInterval IDs
        };

        // ==========================================
        // APPLICATION LOGIC
        // ==========================================
        const APP_LOGIC = {
            
            // Helper: Tampilkan/Sembunyikan Loader
            toggleLoader(show, text = 'Memuat...') {
                const el = document.getElementById('global-loader');
                document.getElementById('loader-text').innerText = text;
                if(show) el.classList.remove('hidden');
                else el.classList.add('hidden');
            },

            // Format Rupiah
            formatRupiah(angka) {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka || 0);
            },

            // Inisialisasi Dropdown Jam (00 - 23)
            initTimeDropdowns() {
                const jamSelect = document.getElementById('f-jam');
                for(let i=0; i<24; i++) {
                    let val = i.toString().padStart(2, '0');
                    jamSelect.innerHTML += `<option value="${val}">${val}</option>`;
                }
            },

            // 1. LOGIN
            async login() {
                const u = document.getElementById('login-user').value.trim();
                const p = document.getElementById('login-pass').value.trim();
                if(!u || !p) return alert("Isi username dan password!");

                this.toggleLoader(true, 'Verifikasi akun...');
                try {
                    const response = await fetch(CONFIG.WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'login', username: u, password: p })
                    });
                    
                    const data = await response.json();
                    
                    // Validasi: n8n mengirim array kosong jika gagal
                    if(data && data.length > 0) {
                        const userData = data[0];
                        APP_STATE.user = {
                            name: userData.id_user_arena,
                            role: userData.role_arena || (userData.id_user_arena === 'Dimas' ? 'manager' : 'admin'),
                            branch: userData.cabang_arena
                        };
                        this.setupDashboard();
                        await this.fetchDashboardData();
                    } else {
                        alert("Login gagal! Cek kembali Nama Admin dan Password.");
                    }
                } catch (err) {
                    console.error(err);
                    alert("Gagal terhubung ke server n8n.");
                } finally {
                    this.toggleLoader(false);
                }
            },

            // 2. SETUP DASHBOARD UI
            setupDashboard() {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                
                document.getElementById('dash-name').innerText = `Halo, ${APP_STATE.user.name}`;
                document.getElementById('dash-role').innerText = APP_STATE.user.role;
                document.getElementById('dash-branch').innerText = APP_STATE.user.branch;

                // Tampilkan tools Manager
                if(APP_STATE.user.role === 'manager') {
                    document.getElementById('manager-tools').classList.remove('hidden');
                }

                // Tampilkan/Sembunyikan Ongkir khusus Banda
                if(APP_STATE.user.branch === 'Banda') {
                    document.getElementById('f-ongkir').classList.remove('hidden');
                }

                this.initTimeDropdowns();
                this.renderUnitGrid();
            },

            // 3. FETCH DATA AWAL (Pricelist & Log Order)
            async fetchDashboardData() {
                this.toggleLoader(true, 'Sinkronisasi data...');
                try {
                    const response = await fetch(CONFIG.WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'get_dashboard' })
                    });
                    const data = await response.json();
                    
                    // Parsing Array Gabungan dari n8n Merge Node
                    APP_STATE.priceList = data.filter(item => item.harga_paket_arena !== undefined);
                    
                    // Filter Log HANYA untuk cabang admin yang login (kecuali manager bisa lihat semua/tergantung rules)
                    const rawLogs = data.filter(item => item.tagihan_arena !== undefined && item.is_active !== false);
                    if(APP_STATE.user.role === 'manager') {
                        APP_STATE.logs = rawLogs; 
                    } else {
                        APP_STATE.logs = rawLogs.filter(log => log.cabang_arena === APP_STATE.user.branch);
                    }

                    this.populatePackages();
                    this.renderLogsAndStats();
                    this.startMasterTimer(); // Jalankan timer UI
                } catch (err) {
                    console.error("Gagal sinkronisasi data:", err);
                } finally {
                    this.toggleLoader(false);
                }
            },

            // Menyiapkan grid kotak-kotak Unit
            renderUnitGrid() {
                const units = CONFIG.BRANCH_UNITS[APP_STATE.user.branch] || [];
                const grid = document.getElementById('unit-grid');
                const selectUnit = document.getElementById('f-unit');
                
                grid.innerHTML = '';
                selectUnit.innerHTML = '<option value="">Pilih Unit</option>';

                units.forEach(u => {
                    grid.innerHTML += `
                        <div id="u-card-${u}" class="glass apple-card p-4 text-center border border-gray-100 flex flex-col justify-center items-center">
                            <span class="text-[10px] text-gray-400 font-semibold tracking-widest">UNIT</span>
                            <span class="text-2xl font-bold mt-1 mb-1">${u}</span>
                            <span id="u-status-${u}" class="text-[10px] uppercase font-bold text-green-500 bg-green-50 px-2 py-1 rounded-full">Ready</span>
                        </div>
                    `;
                    selectUnit.innerHTML += `<option value="${u}">Unit ${u}</option>`;
                });
            },

            populatePackages() {
                const select = document.getElementById('f-paket');
                select.innerHTML = '<option value="">Pilih Paket</option>';
                APP_STATE.priceList.forEach(p => {
                    select.innerHTML += `<option value="${p.nama_paket_arena}" data-price="${p.harga_paket_arena}">${p.nama_paket_arena}</option>`;
                });
            },

            calculatePrice() {
                const select = document.getElementById('f-paket');
                const selectedOpt = select.options[select.selectedIndex];
                if(selectedOpt && selectedOpt.dataset.price) {
                    document.getElementById('f-price').value = selectedOpt.dataset.price;
                }
            },

            // 4. INPUT PENYEWAAN BARU
            async submitRental() {
                const name = document.getElementById('f-name').value.trim();
                const wa = document.getElementById('f-wa').value.trim();
                const unit = document.getElementById('f-unit').value;
                const paket = document.getElementById('f-paket').value;
                const jam = document.getElementById('f-jam').value;
                const menit = document.getElementById('f-menit').value;
                const price = document.getElementById('f-price').value;
                const ongkir = document.getElementById('f-ongkir').value || 0;

                if(!name || !wa || !unit || !paket || !jam || !menit || !price) {
                    return alert("Mohon lengkapi semua form input!");
                }

                const jamMulai = `${jam}:${menit}`;

                const payload = {
                    action: 'input_rental',
                    admin_name: APP_STATE.user.name,
                    branch: APP_STATE.user.branch,
                    unit: unit,
                    paket: paket,
                    price: price,
                    ongkir: ongkir,
                    name: name,
                    wa: wa,
                    status_unit: 'booked',
                    jam_mulai_sewa: jamMulai
                };

                this.toggleLoader(true, 'Menyimpan transaksi...');
                try {
                    await fetch(CONFIG.WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    // Reset Form
                    document.getElementById('f-name').value = '';
                    document.getElementById('f-wa').value = '';
                    
                    // Refresh Dashboard Data
                    await this.fetchDashboardData();
                } catch (err) {
                    alert('Gagal menyimpan ke n8n');
                } finally {
                    this.toggleLoader(false);
                }
            },

            // 5. UPDATE STATUS (Play / Finish / Soft Delete)
            async changeStatus(rowId, newStatus) {
                if(newStatus === 'deleted' && !confirm("Yakin ingin menghapus transaksi ini? (Soft Delete)")) return;

                this.toggleLoader(true, 'Update status...');
                try {
                    await fetch(CONFIG.WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'update_status',
                            row_id: rowId,
                            status_unit: newStatus
                        })
                    });
                    await this.fetchDashboardData();
                } catch (err) {
                    alert('Gagal update status');
                } finally {
                    this.toggleLoader(false);
                }
            },

            // 6. INPUT EXPENSE (Khusus Manager)
            async submitExpense() {
                const name = document.getElementById('ex-name').value;
                const amount = document.getElementById('ex-amount').value;
                if(!name || !amount) return alert("Isi keterangan dan nominal!");

                const dateStr = new Date().toISOString().split('T')[0];

                this.toggleLoader(true, 'Mencatat pengeluaran...');
                try {
                    await fetch(CONFIG.WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'add_expense',
                            expense_name: name,
                            expense_amount: amount,
                            expense_date: dateStr,
                            branch: APP_STATE.user.branch
                        })
                    });
                    document.getElementById('ex-name').value = '';
                    document.getElementById('ex-amount').value = '';
                    alert("Pengeluaran tercatat!");
                } catch (err) {
                    alert('Gagal menyimpan pengeluaran');
                } finally {
                    this.toggleLoader(false);
                }
            },

            // 7. RENDER LOGS, STATUS UNIT & HITUNG OMSET
            renderLogsAndStats() {
                const logList = document.getElementById('log-list');
                let totalOmset = 0;
                logList.innerHTML = '';

                // Reset semua Unit Card Visual ke Ready dulu
                const units = CONFIG.BRANCH_UNITS[APP_STATE.user.branch] || [];
                units.forEach(u => {
                    const statusEl = document.getElementById(`u-status-${u}`);
                    const cardEl = document.getElementById(`u-card-${u}`);
                    if(statusEl) {
                        statusEl.innerText = 'Ready';
                        statusEl.className = 'text-[10px] uppercase font-bold text-green-500 bg-green-50 px-2 py-1 rounded-full';
                        cardEl.classList.remove('border-blue-400', 'bg-blue-50/30', 'border-orange-400');
                    }
                });

                APP_STATE.logs.forEach(log => {
                    // Cek jika status dicancel/deleted, jangan hitung ke omset
                    if(log.status_unit_arena !== 'cancelled' && log.status_unit_arena !== 'deleted') {
                        totalOmset += Number(log.tagihan_arena || 0);
                    }

                    // Update Visual Unit Grid jika unit milik cabang ini
                    if(units.includes(Number(log.unit_arena))) {
                        const sEl = document.getElementById(`u-status-${log.unit_arena}`);
                        const cEl = document.getElementById(`u-card-${log.unit_arena}`);
                        if(sEl) {
                            sEl.innerText = log.status_unit_arena;
                            if(log.status_unit_arena === 'booked') {
                                sEl.className = 'text-[10px] uppercase font-bold text-orange-500 bg-orange-50 px-2 py-1 rounded-full';
                                cEl.classList.add('border-orange-400');
                            } else if (log.status_unit_arena === 'playing') {
                                sEl.className = 'text-[10px] uppercase font-bold text-blue-500 bg-blue-50 px-2 py-1 rounded-full';
                                cEl.classList.add('border-blue-400', 'bg-blue-50/30');
                            }
                        }
                    }

                    // Buat Card Log Order
                    const pkg = APP_STATE.priceList.find(p => p.nama_paket_arena === log.paket_arena);
                    const durasiMenit = pkg ? pkg.durasi_menit_arena : 0;
                    
                    let actionButtons = '';
                    if(log.status_unit_arena === 'booked') {
                        actionButtons = `
                            <button onclick="APP_LOGIC.changeStatus('${log.id}', 'playing')" class="text-xs bg-blue-600 text-white px-3 py-1 rounded-lg btn-taktil">Play</button>
                            <button onclick="APP_LOGIC.changeStatus('${log.id}', 'cancelled')" class="text-xs bg-gray-200 text-gray-700 px-3 py-1 rounded-lg btn-taktil">Cancel</button>
                        `;
                    } else if (log.status_unit_arena === 'playing') {
                        actionButtons = `<button onclick="APP_LOGIC.changeStatus('${log.id}', 'finished')" class="text-xs bg-black text-white px-3 py-1 rounded-lg btn-taktil">Finish</button>`;
                    }

                    // Tombol hapus manager
                    let delBtn = '';
                    if(APP_STATE.user.role === 'manager' && log.status_unit_arena !== 'deleted') {
                        delBtn = `<button onclick="APP_LOGIC.changeStatus('${log.id}', 'deleted')" class="text-xs text-red-500 hover:underline">Hapus Log</button>`;
                    }

                    // WA Link & Button
                    const waLinkBase = log.link_wa_pelanggan_arena;
                    let waBtn = `<a href="${waLinkBase}" target="_blank" class="text-green-500 hover:text-green-600">
                                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
                                 </a>`;
                    
                    logList.innerHTML += `
                        <div class="p-3 border rounded-xl bg-white/50 relative">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="font-bold text-sm">Unit ${log.unit_arena} <span class="text-xs text-gray-400 font-normal">(${log.paket_arena})</span></p>
                                    <p class="text-xs text-gray-500">${log.nama_pelanggan_arena} - Input: ${log.jam_mulai_sewa}</p>
                                    <p class="text-xs font-semibold mt-1">Status: <span class="uppercase">${log.status_unit_arena}</span></p>
                                    <p class="text-xs text-red-500 mt-1 timer-display" data-wa="${waLinkBase}" data-status="${log.status_unit_arena}" data-start="${log.jam_mulai_sewa}" data-dur="${durasiMenit}">Menghitung waktu...</p>
                                </div>
                                <div class="text-right flex flex-col items-end gap-2">
                                    <div class="flex items-center gap-2">
                                        ${actionButtons}
                                        <div class="wa-container">${waBtn}</div>
                                    </div>
                                    ${delBtn}
                                </div>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('dash-omset').innerText = this.formatRupiah(totalOmset);
                this.updateTimers(); // Paksa hitung 1 kali langsung
            },

            // 8. LOGIKA COUNTDOWN TIMER & SMART WA
            startMasterTimer() {
                if(APP_STATE.timers.master) clearInterval(APP_STATE.timers.master);
                APP_STATE.timers.master = setInterval(() => this.updateTimers(), 60000); // Update setiap 1 menit (60000ms)
            },

            updateTimers() {
                const now = new Date();
                document.querySelectorAll('.timer-display').forEach(el => {
                    const status = el.dataset.status;
                    if(status !== 'playing') {
                        el.innerText = '';
                        return;
                    }

                    const durasiMenit = parseInt(el.dataset.dur) || 0;
                    if(durasiMenit === 0) {
                        el.innerText = 'Waktu Bebas / No Timer';
                        return;
                    }

                    const startStr = el.dataset.start; // Format "HH:mm"
                    if(!startStr.includes(':')) return;

                    const [jamMulai, menitMulai] = startStr.split(':');
                    let targetTime = new Date();
                    targetTime.setHours(parseInt(jamMulai), parseInt(menitMulai), 0);
                    targetTime.setMinutes(targetTime.getMinutes() + durasiMenit);

                    // Kalkulasi sisa waktu
                    const diffMs = targetTime - now;
                    const waContainer = el.closest('.flex').querySelector('.wa-container');

                    if(diffMs <= 0) {
                        el.innerText = "WAKTU HABIS (00:00)";
                        el.classList.add('time-up-anim', 'text-red-600', 'font-bold');
                        
                        // Ubah Pesan WA otomatis
                        const baseWa = el.dataset.wa;
                        const msg = encodeURIComponent("ijin abangku, kami mau kasi tau kalau durasi udah abis ya..");
                        waContainer.innerHTML = `
                            <a href="${baseWa}?text=${msg}" target="_blank" class="bg-red-100 text-red-600 p-1.5 rounded-full block time-up-anim">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
                            </a>
                        `;
                    } else {
                        const diffMins = Math.floor(diffMs / 60000);
                        const h = Math.floor(diffMins / 60);
                        const m = diffMins % 60;
                        el.innerText = `Sisa waktu: ${h}j ${m}m`;
                        el.classList.remove('time-up-anim', 'text-red-600', 'font-bold');
                    }
                });
            }
        };
    </script>
</body>
</html>
